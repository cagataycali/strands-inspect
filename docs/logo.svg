<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gray strand (code being inspected) -->
  <path d="M30 85 Q60 70 90 85" stroke="#989898" stroke-width="3" stroke-linecap="round" fill="none" opacity=".4"/>
  <path d="M25 95 Q60 80 95 95" stroke="#989898" stroke-width="3" stroke-linecap="round" fill="none" opacity=".3"/>
  <path d="M20 105 Q60 90 100 105" stroke="#989898" stroke-width="3" stroke-linecap="round" fill="none" opacity=".2"/>
  <!-- Green strand (inspector) -->
  <path d="M35 55 Q60 40 85 55" stroke="#00FF77" stroke-width="3" stroke-linecap="round" fill="none" opacity=".8">
    <animate attributeName="d" values="M35 55 Q60 40 85 55;M35 58 Q60 42 85 58;M35 55 Q60 40 85 55" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M30 65 Q60 50 90 65" stroke="#00FF77" stroke-width="3" stroke-linecap="round" fill="none" opacity=".6">
    <animate attributeName="d" values="M30 65 Q60 50 90 65;M30 68 Q60 52 90 68;M30 65 Q60 50 90 65" dur="3s" repeatCount="indefinite" begin=".2s"/>
  </path>
  <!-- Magnifying glass -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,-5; -10,5; 0,0" dur="4s" repeatCount="indefinite"/>
    <circle cx="60" cy="38" r="16" stroke="#00FF77" stroke-width="2" fill="none" opacity=".9"/>
    <circle cx="60" cy="38" r="16" stroke="#00FF77" stroke-width="6" fill="none" opacity=".1"/>
    <line x1="72" y1="50" x2="82" y2="60" stroke="#00FF77" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="38" x2="72" y2="38" stroke="#00FF77" stroke-width="1" opacity=".5">
      <animate attributeName="y1" values="30;46;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="30;46;30" dur="1.5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
